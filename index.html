<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Proyectos">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>Mis Proyectos</title>
<style>
  :root {
    --bg: #0a0a0a; --card: #161616; --border: #2a2a2a;
    --text: #e5e5e5; --dim: #888; --accent: #3b82f6;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --purple: #a855f7;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    min-height: 100dvh;
    -webkit-user-select: none; user-select: none;
  }
  header {
    padding: 20px 0 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .add-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none;
    font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .stats { display: flex; gap: 8px; padding: 8px 0 16px; overflow-x: auto; }
  .stat {
    padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
    white-space: nowrap; cursor: pointer; border: 1px solid var(--border);
    background: var(--card); transition: all .15s;
  }
  .stat.active { border-color: var(--accent); background: #3b82f615; color: var(--accent); }
  .stat .count { margin-left: 4px; opacity: .6; }
  .projects { display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
  .project {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; cursor: pointer; transition: all .15s;
  }
  .project:active { transform: scale(0.98); }
  .project-header { display: flex; justify-content: space-between; align-items: start; }
  .project-name { font-size: 17px; font-weight: 600; }
  .project-desc { font-size: 13px; color: var(--dim); margin-top: 4px; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
  }
  .badge-activo { background: #22c55e20; color: var(--green); }
  .badge-pausado { background: #eab30820; color: var(--yellow); }
  .badge-idea { background: #a855f720; color: var(--purple); }
  .badge-hecho { background: #3b82f620; color: var(--accent); }
  .project-meta {
    display: flex; gap: 12px; margin-top: 10px; font-size: 12px; color: var(--dim); flex-wrap: wrap;
  }
  .project-meta span { display: flex; align-items: center; gap: 4px; }
  .next-step {
    margin-top: 10px; padding: 8px 10px; background: #ffffff08; border-radius: 8px;
    font-size: 13px; color: var(--dim); border-left: 3px solid var(--accent);
  }
  .next-step strong { color: var(--text); font-weight: 500; }
  .modal-overlay {
    position: fixed; inset: 0; background: #000a; z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 16px 16px 0 0;
    width: 100%; max-width: 500px; max-height: 85dvh; overflow-y: auto;
    padding: 20px 20px env(safe-area-inset-bottom);
    animation: slideUp .2s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } }
  .modal h2 { font-size: 20px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 15px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-delete { background: var(--red); color: #fff; font-size: 13px; padding: 8px; margin-top: 8px; width: 100%; border-radius: 8px; border: none; cursor: pointer; }
  @media (min-width: 600px) {
    body { max-width: 540px; margin: 0 auto; padding: 0 20px; }
    .modal { border-radius: 16px; margin-bottom: 20px; }
  }
</style>
</head>
<body>
<header>
  <h1>Mis Proyectos</h1>
  <button class="add-btn" onclick="openModal()">+</button>
</header>
<div class="stats" id="filters"></div>
<div class="projects" id="list"></div>
<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">Nuevo Proyecto</h2>
    <div class="field"><label>Nombre</label><input id="f-name"></div>
    <div class="field"><label>Descripcion</label><input id="f-desc"></div>
    <div class="field">
      <label>Estado</label>
      <select id="f-status">
        <option value="activo">Activo</option>
        <option value="pausado">Pausado</option>
        <option value="idea">Idea</option>
        <option value="hecho">Hecho</option>
      </select>
    </div>
    <div class="field"><label>Branch actual</label><input id="f-branch" placeholder="main"></div>
    <div class="field"><label>Ultimo cambio</label><input id="f-last" placeholder="Lo que hiciste"></div>
    <div class="field"><label>Proximo paso</label><textarea id="f-next" placeholder="Que sigue..."></textarea></div>
    <div class="field"><label>Notas</label><textarea id="f-notes" placeholder="Notas extras..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="save()">Guardar</button>
    </div>
    <button class="btn-delete" id="deleteBtn" onclick="del()" style="display:none">Eliminar proyecto</button>
  </div>
</div>
<script>
const STORAGE_KEY = 'leandro_projects_v1';
let projects = [];
let editingId = null;
let activeFilter = 'todos';
const DEFAULT_PROJECTS = [
  { id: crypto.randomUUID(), name: 'FaturasAL', desc: 'Facturacion: Airbnb + Booking + CVA -> InvoiceXpress / Moloni', status: 'activo', branch: 'feature/lodgify-moloni', last: 'Enforce single PMS + single invoicing provider', next: 'Terminar integracion Lodgify + Moloni. Testear flujo completo.', notes: 'v0.6 - Vercel deploy auto en main', ts: Date.now() },
  { id: crypto.randomUUID(), name: 'SIBASync', desc: 'Check-in de huespedes + envio SIBA automatico', status: 'activo', branch: 'main', last: 'Debug Smoobu API (raw apartment sample)', next: 'Arreglar integracion Smoobu. Verificar cap max guests.', notes: 'Comparte Supabase con FaturasAL', ts: Date.now() },
  { id: crypto.randomUUID(), name: 'INESync', desc: 'Sync de datos INE automatico', status: 'activo', branch: 'main', last: 'Legal pages (privacy, terms, cookies)', next: 'Listo v1.0 - monitorear y agregar features si necesario.', notes: 'Comparte Supabase con FaturasAL', ts: Date.now() },
  { id: crypto.randomUUID(), name: 'AirInvoicer', desc: 'Chrome extension para generar facturas', status: 'activo', branch: 'main', last: 'Enforce download limits por plan, fix UI badges', next: 'Verificar flujo de password reset. Monitorear limites.', notes: 'v1.2.1 - Extension + Site', ts: Date.now() },
  { id: crypto.randomUUID(), name: 'AirInvoicer Site', desc: 'Landing page / marketing site de AirInvoicer', status: 'activo', branch: 'main', last: 'YouTube demo video + password reset page', next: 'Webhook billing logic (keep highest plan rank).', notes: 'Repo: airinvoicer-site', ts: Date.now() },
  { id: crypto.randomUUID(), name: 'MadeiraHostGuide', desc: 'Guia / directorio de alojamiento en Madeira', status: 'pausado', branch: 'main', last: 'Update precios setup service, coming soon masterclass', next: 'Actualizar offerings cuando esten listos.', notes: '', ts: Date.now() },
  { id: crypto.randomUUID(), name: 'BuildFor', desc: 'Smart contracts platform - ERC-721 / ERC-1155', status: 'idea', branch: 'main', last: 'API server + frontend studio + deploy pipeline', next: 'Definir roadmap. Solo 2 commits hasta ahora.', notes: '', ts: Date.now() }
];
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { projects = JSON.parse(raw); } else { projects = DEFAULT_PROJECTS; persist(); }
}
function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); }
function render() {
  const counts = { todos: projects.length, activo: 0, pausado: 0, idea: 0, hecho: 0 };
  projects.forEach(p => counts[p.status] = (counts[p.status] || 0) + 1);
  const labels = { todos: 'Todos', activo: 'Activo', pausado: 'Pausado', idea: 'Idea', hecho: 'Hecho' };
  document.getElementById('filters').innerHTML = Object.entries(labels).map(([k, v]) =>
    '<div class="stat '+(activeFilter === k ? 'active' : '')+'" onclick="filter(\''+k+'\')">'+v+'<span class="count">'+(counts[k] || 0)+'</span></div>'
  ).join('');
  const filtered = activeFilter === 'todos' ? projects : projects.filter(p => p.status === activeFilter);
  const sorted = [...filtered].sort((a, b) => {
    const order = { activo: 0, pausado: 1, idea: 2, hecho: 3 };
    return (order[a.status] || 9) - (order[b.status] || 9) || b.ts - a.ts;
  });
  document.getElementById('list').innerHTML = sorted.map(p =>
    '<div class="project" onclick="openModal(\''+p.id+'\')">' +
      '<div class="project-header">' +
        '<div class="project-name">'+esc(p.name)+'</div>' +
        '<div class="badge badge-'+p.status+'">'+p.status+'</div>' +
      '</div>' +
      '<div class="project-desc">'+esc(p.desc)+'</div>' +
      '<div class="project-meta">' +
        (p.branch ? '<span>&#9741; '+esc(p.branch)+'</span>' : '') +
        (p.last ? '<span>&#8635; '+esc(p.last)+'</span>' : '') +
      '</div>' +
      (p.next ? '<div class="next-step"><strong>Proximo:</strong> '+esc(p.next)+'</div>' : '') +
    '</div>'
  ).join('') || '<p style="text-align:center;color:var(--dim);padding:40px">Sin proyectos</p>';
}
function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function filter(f) { activeFilter = f; render(); }
function openModal(id) {
  var overlay = document.getElementById('overlay');
  if (id) {
    var p = projects.find(function(x) { return x.id === id; });
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Editar Proyecto';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-desc').value = p.desc || '';
    document.getElementById('f-status').value = p.status || 'activo';
    document.getElementById('f-branch').value = p.branch || '';
    document.getElementById('f-last').value = p.last || '';
    document.getElementById('f-next').value = p.next || '';
    document.getElementById('f-notes').value = p.notes || '';
    document.getElementById('deleteBtn').style.display = 'block';
  } else {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Nuevo Proyecto';
    ['f-name','f-desc','f-branch','f-last','f-next','f-notes'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('f-status').value = 'activo';
    document.getElementById('deleteBtn').style.display = 'none';
  }
  overlay.classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('overlay').classList.remove('open');
}
function save() {
  var data = {
    name: document.getElementById('f-name').value.trim(),
    desc: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    branch: document.getElementById('f-branch').value.trim(),
    last: document.getElementById('f-last').value.trim(),
    next: document.getElementById('f-next').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    ts: Date.now()
  };
  if (!data.name) return;
  if (editingId) {
    var idx = projects.findIndex(function(p) { return p.id === editingId; });
    if (idx >= 0) projects[idx] = Object.assign({}, projects[idx], data);
  } else {
    projects.push(Object.assign({ id: crypto.randomUUID() }, data));
  }
  persist(); render(); closeModal();
}
function del() {
  if (!editingId) return;
  if (!confirm('Eliminar este proyecto?')) return;
  projects = projects.filter(function(p) { return p.id !== editingId; });
  persist(); render(); closeModal();
}
load(); render();
</script>
</body>
</html>
